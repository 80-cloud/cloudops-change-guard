# @PROJECT@ TLS 版。@DOMAIN@ と証明書(/etc/@PROJECT@/tls/)は setup-tls.sh が用意する。
# provision.sh の平文 conf を置き換える形で設置される。

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name @DOMAIN@;

    # ACME http-01 challenge（証明書の取得・更新時に 80 で応答）
    location /.well-known/acme-challenge/ {
        root /var/www/@PROJECT@;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name @DOMAIN@;

    ssl_certificate     /etc/@PROJECT@/tls/fullchain.pem;
    ssl_certificate_key /etc/@PROJECT@/tls/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/@PROJECT@;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /api/ {
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /actuator/health {
        proxy_pass http://127.0.0.1:8084;
    }

    location / {
        try_files $uri /index.html;
    }
}
