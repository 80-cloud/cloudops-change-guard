# @PROJECT@ 用 nginx（React 静的配信 ＋ /api → Spring Boot :8084）。
# provision.sh が @PROJECT@ を実プロジェクト名へ置換して /etc/nginx/conf.d/ に設置する。
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/@PROJECT@;
    index index.html;

    # アプリ側で未設定のセキュリティヘッダを nginx で付与（HSTS は TLS 化後に追加）。
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # API は Spring Boot へ（axios は /api/v1 相対・パスを保持して転送）。
    location /api/ {
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ヘルスチェック（未認証開放・監視/ロードバランサ用）。
    location = /actuator/health {
        proxy_pass http://127.0.0.1:8084;
    }

    # SPA フォールバック。
    location / {
        try_files $uri /index.html;
    }
}
