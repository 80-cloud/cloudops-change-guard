name: CD Deploy

# 人間ゲート（workflow_dispatch・SHA を明示）で、成果物バケットの不変成果物を
# SSM Run Command でインスタンスへ配備する。terraform apply は含まない。
# AWS 変数が未設定ならジョブごとスキップする。

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "配備する成果物のコミットSHA（cd-build がアップロードした値）"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.AWS_DEPLOY_ROLE_ARN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-1' }}

      - name: Deploy via SSM Run Command
        env:
          BUCKET: ${{ vars.ARTIFACTS_BUCKET }}
          INSTANCE: ${{ vars.APP_INSTANCE_ID }}
          SHA: ${{ inputs.sha }}
          PROJECT: cloudops-change-guard
        run: |
          set -euo pipefail
          B64=$(base64 -w0 infra/deploy/deploy-remote.sh)
          printf '{"commands":["echo %s | base64 -d > /tmp/deploy-remote.sh && bash /tmp/deploy-remote.sh %s %s %s"]}' \
            "$B64" "$BUCKET" "$SHA" "$PROJECT" > /tmp/params.json
          CID=$(aws ssm send-command \
            --instance-ids "$INSTANCE" \
            --document-name AWS-RunShellScript \
            --comment "deploy $SHA" \
            --parameters file:///tmp/params.json \
            --query Command.CommandId --output text)
          echo "command id: $CID"
          aws ssm wait command-executed --command-id "$CID" --instance-id "$INSTANCE" || true
          STATUS=$(aws ssm get-command-invocation --command-id "$CID" --instance-id "$INSTANCE" --query Status --output text)
          echo "----- remote stdout -----"
          aws ssm get-command-invocation --command-id "$CID" --instance-id "$INSTANCE" --query StandardOutputContent --output text
          echo "----- remote stderr -----"
          aws ssm get-command-invocation --command-id "$CID" --instance-id "$INSTANCE" --query StandardErrorContent --output text
          echo "status: $STATUS"
          test "$STATUS" = "Success"
