name: Backend Check

# backend（Java/Gradle）の回帰を PR で機械ゲートする。
# Testcontainers の結合テストを含む ./gradlew build を実行（Docker は ubuntu ランナーに同梱）。

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-check.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-check.yml"

concurrency:
  group: backend-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: backend build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        working-directory: backend
        run: ./gradlew build --no-daemon
