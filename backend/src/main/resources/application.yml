server:
  port: 8084

spring:
  application:
    name: cloudops-change-guard
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5436/cloudops}
    username: ${DB_USER:cloudops}
    password: ${DB_PASSWORD:cloudops}
  jpa:
    hibernate:
      ddl-auto: none           # スキーマの正は Flyway。Hibernate には作らせない
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-must-be-at-least-32-bytes-long-xx}
    access-ttl-seconds: ${JWT_ACCESS_TTL:900}        # 15分（短命 access）
    refresh-ttl-seconds: ${JWT_REFRESH_TTL:1209600}  # 14日（refresh・DB rotation）
    cookie-secure: ${JWT_COOKIE_SECURE:false}        # 本番は true
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5177}
  seed:
    enabled: ${SEED_ENABLED:true}                    # 初期ユーザー＋policy_rules 投入
    admin-username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
    admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:ChangeMe!2026}
    default-password: ${SEED_DEFAULT_PASSWORD:demo}  # admin 以外の初期ユーザー

cloudops:
  aws:
    region: ${AWS_REGION:ap-northeast-1}        # infra/variables.tf と一致
    endpoint-override: ${AWS_ENDPOINT_OVERRIDE:} # 空=実AWS / LocalStackは http://localhost:4566
    plan-bucket: ${AWS_PLAN_BUCKET:}             # 実 plan(text) を置く S3 バケット（aws プロファイル時のみ使用）

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized   # 未認証には簡素、認証済みに詳細
      show-components: when_authorized
      probes:
        enabled: true                 # liveness/readiness（Phase6 で活用）
  health:
    db:
      enabled: true                   # DB 断は health=DOWN(503)

logging:
  level:
    com.cloudopsguard: INFO
  pattern:
    correlation: "[%X{requestId:-},%X{userId:-}] "
