# CloudOps Change Guard — ローカル開発スタック
# Phase 2 は PostgreSQL のみ。backend/frontend サービスは段階的に追加（Phase 5 で完成）。
# ポートは固定（5436）。CLAUDE.md のポート規律に従う。
services:
  db:
    image: postgres:16
    container_name: cloudops-pg
    environment:
      POSTGRES_DB: cloudops
      POSTGRES_USER: cloudops
      POSTGRES_PASSWORD: cloudops
    ports:
      - "5436:5432"
    volumes:
      - cloudops-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudops -d cloudops"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cloudops-pgdata:
